<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Builds</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: #dffefe;
      overflow-x: hidden;
    }

    /* BACKGROUND */
    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      /* ZOOM BACK */
      background: url('polarsaloon.png') center/cover no-repeat;

      /* BRIGHTER */
      filter: brightness(0.62) blur(3px);

      transform: scale(1.05);

      z-index: -2;
    }

    /* TURQUOISE OVERLAY */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      background:
        radial-gradient(
          circle at center,
          rgba(0, 255, 220, 0.06),
          rgba(0,0,0,0.72)
        );

      z-index: -1;
    }

    /* TOP PANEL */
    header {
      padding: 18px 30px;
      background: rgba(0,0,0,0.92);

      display: flex;
      justify-content: space-between;
      align-items: center;

      border-bottom: 1px solid rgba(0,255,220,0.25);

      backdrop-filter: blur(8px);
    }

    .logo {
      font-family: 'Orbitron', sans-serif;

      color: #63fff2;

      font-weight: 700;
      font-size: 28px;

      letter-spacing: 2px;

      text-shadow:
        0 0 8px rgba(99,255,242,0.5),
        0 0 18px rgba(99,255,242,0.2);
    }

    nav {
      display: flex;
      gap: 16px;
    }

    nav a {
      color: #dffefe;

      text-decoration: none;

      padding: 14px 22px;

      background: rgba(10,20,20,0.7);

      border: 1px solid rgba(99,255,242,0.55);

      border-radius: 12px;

      font-weight: bold;
      font-size: 16px;

      transition: 0.25s;
    }

    nav a:hover {
      background: #63fff2;
      color: black;

      box-shadow:
        0 0 14px rgba(99,255,242,0.6);
    }

    /* TITLE */
    h1 {
      font-family: 'Orbitron', sans-serif;

      font-size: 56px;

      margin: 35px 20px 15px;

      color: #63fff2;

      letter-spacing: 2px;

      text-shadow:
        0 0 12px rgba(99,255,242,0.45),
        0 0 28px rgba(99,255,242,0.15);
    }

    /* CONTAINER */
    .container {
      display: flex;
      flex-direction: column;

      gap: 18px;

      padding: 10px 20px 40px;
    }

    /* BUILD CARDS */
    .card {
      background:
        linear-gradient(
          145deg,
          rgba(5,18,20,0.82),
          rgba(0,0,0,0.72)
        );

      border: 1px solid rgba(99,255,242,0.35);

      border-radius: 14px;

      padding: 20px;

      box-shadow:
        0 0 18px rgba(99,255,242,0.08);

      opacity: 0;
      transform: translateX(-60px);

      animation: slideIn 0.5s ease forwards;
    }

    .card:nth-child(1) {
      animation-delay: 0.15s;
    }

    .card:nth-child(2) {
      animation-delay: 0.30s;
    }

    @keyframes slideIn {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .card h2 {
      margin: 0;

      color: #63fff2;

      font-family: 'Orbitron', sans-serif;

      font-size: 24px;

      text-shadow:
        0 0 8px rgba(99,255,242,0.25);
    }

    .card p {
      margin: 7px 0;

      color: #dffefe;

      font-size: 15px;
    }

    .tag {
      display: inline-block;

      margin-top: 10px;

      padding: 7px 12px;

      border-radius: 8px;

      border: 1px solid rgba(99,255,242,0.55);

      color: #63fff2;

      font-size: 12px;

      background: rgba(0,255,220,0.05);
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<header>
  <div class="logo">FAR FAR WEST BUILDS</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="builds.html">Builds</a>
    <a href="tiers.html">Tires</a>
  </nav>
</header>

<h1>Builds</h1>

<div class="container">

  <div class="card">
    <h2>Dust Reaper</h2>
    <p>Weapon: Repeater Rifle</p>
    <p>Playstyle: Mid-range burst damage</p>
    <span class="tag">Tier: S</span>
  </div>

  <div class="card">
    <h2>Gunslinger</h2>
    <p>Weapon: Dual Revolvers</p>
    <p>Playstyle: Fast close combat DPS</p>
    <span class="tag">Tier: A</span>
  </div>

</div>

</body>
</html>
