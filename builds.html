<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Builds</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: #f2e6d0;
      overflow-x: hidden;
    }

    /* BACKGROUND */
    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('polarsaloon.png') center/cover no-repeat;
      filter: brightness(0.45) blur(3px);
      z-index: -2;
    }

    /* OVERLAY */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(
        circle at center,
        rgba(0,0,0,0.10),
        rgba(0,0,0,0.80)
      );
      z-index: -1;
    }

    /* TOP PANEL */
    header {
      padding: 18px 30px;
      background: #000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a2a2a;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      color: #d99a4e;
      font-weight: 700;
      font-size: 26px;
      letter-spacing: 2px;
    }

    nav {
      display: flex;
      gap: 16px;
    }

    nav a {
      color: #f2e6d0;
      text-decoration: none;
      padding: 14px 22px;
      background: #121212;
      border: 1px solid #f2e6d0;
      border-radius: 12px;
      font-weight: bold;
      font-size: 16px;
    }

    nav a:hover {
      background: #d99a4e;
      color: black;
      border-color: #d99a4e;
    }

    /* TITLE */
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 52px;
      margin: 30px 20px 10px;
      color: #d99a4e;
      letter-spacing: 2px;
    }

    /* BUILD CONTAINER */
    .container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 10px 20px 40px;
    }

    /* BUILD CARDS */
    .card {
      background: linear-gradient(
        145deg,
        rgba(20,20,20,0.85),
        rgba(10,10,10,0.75)
      );

      border: 1px solid rgba(217,154,78,0.35);
      border-radius: 14px;
      padding: 18px 20px;

      opacity: 0;
      transform: translateX(-60px);
      animation: slideIn 0.5s ease forwards;
    }

    .card:nth-child(1) {
      animation-delay: 0.15s;
    }

    .card:nth-child(2) {
      animation-delay: 0.30s;
    }

    @keyframes slideIn {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .card h2 {
      margin: 0;
      color: #d99a4e;
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
    }

    .card p {
      margin: 6px 0;
      color: #d6c2a8;
    }

    .tag {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid #f2e6d0;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<header>
  <div class="logo">FAR FAR WEST BUILDS</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="builds.html">Builds</a>
    <a href="tiers.html">Tires</a>
  </nav>
</header>

<h1>Builds</h1>

<div class="container">

  <div class="card">
    <h2>Dust Reaper</h2>
    <p>Weapon: Repeater Rifle</p>
    <p>Playstyle: Mid-range burst damage</p>
    <span class="tag">Tier: S</span>
  </div>

  <div class="card">
    <h2>Gunslinger</h2>
    <p>Weapon: Dual Revolvers</p>
    <p>Playstyle: Fast close combat DPS</p>
    <span class="tag">Tier: A</span>
  </div>

</div>

</body>
</html>
