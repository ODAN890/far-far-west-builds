<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Builds</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: #dffefe;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('polarsaloon.png') center/cover no-repeat;
      filter: brightness(0.62) blur(3px);
      transform: scale(1.05);
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(
        circle at center,
        rgba(0, 255, 220, 0.06),
        rgba(0,0,0,0.72)
      );
      z-index: -1;
    }

    header {
      padding: 18px 30px;
      background: rgba(0,0,0,0.92);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(0,255,220,0.25);
      backdrop-filter: blur(8px);
      position: relative;
      z-index: 100;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      color: #63fff2;
      font-weight: 700;
      font-size: 28px;
      letter-spacing: 2px;
      text-shadow:
        0 0 8px rgba(99,255,242,0.5),
        0 0 18px rgba(99,255,242,0.2);
      flex-shrink: 0;
    }

    /* SEARCH */
    .search-wrapper {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 340px;
      z-index: 101;
    }

    .search-input {
      width: 100%;
      padding: 10px 16px;
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input::placeholder {
      color: #666;
    }

    .search-input:focus {
      border-color: #555;
      box-shadow: 0 0 10px rgba(255,255,255,0.05);
    }

    .search-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: #111;
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      overflow: hidden;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
      z-index: 200;
    }

    .search-dropdown.visible {
      display: block;
    }

    .dropdown-item {
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid #1e1e1e;
      transition: background 0.15s;
    }

    .dropdown-item:last-child {
      border-bottom: none;
    }

    .dropdown-item:hover,
    .dropdown-item.active {
      background: #222;
    }

    .dropdown-item .item-name {
      font-size: 14px;
      font-weight: bold;
      color: #e0e0e0;
      margin-bottom: 2px;
    }

    .dropdown-item .item-name mark {
      background: transparent;
      color: #d99a4e;
      font-weight: bold;
    }

    .dropdown-item .item-meta {
      font-size: 12px;
      color: #777;
    }

    .dropdown-item .item-source {
      display: inline-block;
      margin-top: 4px;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 5px;
      background: #1e1e1e;
      border: 1px solid #333;
      color: #999;
    }

    .dropdown-item .item-source.builds {
      color: #63fff2;
      border-color: rgba(99,255,242,0.3);
    }

    .dropdown-item .item-source.tiers {
      color: #ff8db3;
      border-color: rgba(255,141,179,0.3);
    }

    .dropdown-empty {
      padding: 14px 16px;
      color: #555;
      font-size: 13px;
      text-align: center;
    }

    nav {
      display: flex;
      gap: 16px;
      flex-shrink: 0;
    }

    nav a {
      color: #dffefe;
      text-decoration: none;
      padding: 14px 22px;
      background: rgba(10,20,20,0.7);
      border: 1px solid rgba(99,255,242,0.55);
      border-radius: 12px;
      font-weight: bold;
      font-size: 16px;
      transition: 0.25s;
    }

    nav a:hover {
      background: #63fff2;
      color: black;
      box-shadow: 0 0 14px rgba(99,255,242,0.6);
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 56px;
      margin: 35px 20px 15px;
      color: #63fff2;
      letter-spacing: 2px;
      text-shadow:
        0 0 12px rgba(99,255,242,0.45),
        0 0 28px rgba(99,255,242,0.15);
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 10px 20px 40px;
    }

    .card {
      background: linear-gradient(
        145deg,
        rgba(5,18,20,0.82),
        rgba(0,0,0,0.72)
      );
      border: 1px solid rgba(99,255,242,0.35);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 0 18px rgba(99,255,242,0.08);
      opacity: 0;
      transform: translateX(-60px);
      animation: slideIn 0.5s ease forwards;
    }

    .card:nth-child(1) { animation-delay: 0.15s; }
    .card:nth-child(2) { animation-delay: 0.30s; }

    @keyframes slideIn {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .card h2 {
      margin: 0;
      color: #63fff2;
      font-family: 'Orbitron', sans-serif;
      font-size: 24px;
      text-shadow: 0 0 8px rgba(99,255,242,0.25);
    }

    .card p {
      margin: 7px 0;
      color: #dffefe;
      font-size: 15px;
    }

    .tag {
      display: inline-block;
      margin-top: 10px;
      padding: 7px 12px;
      border-radius: 8px;
      border: 1px solid rgba(99,255,242,0.55);
      color: #63fff2;
      font-size: 12px;
      background: rgba(0,255,220,0.05);
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<header>
  <div class="logo">FAR FAR WEST BUILDS</div>

  <div class="search-wrapper">
    <input
      class="search-input"
      type="text"
      placeholder="Search builds, tiers..."
      id="searchInput"
      autocomplete="off"
    />
    <div class="search-dropdown" id="searchDropdown"></div>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="builds.html">Builds</a>
    <a href="tiers.html">Tires</a>
  </nav>
</header>

<h1>Builds</h1>

<div class="container">

  <div class="card">
    <h2>Dust Reaper</h2>
    <p>Weapon: Repeater Rifle</p>
    <p>Playstyle: Mid-range burst damage</p>
    <span class="tag">Tier: S</span>
  </div>

  <div class="card">
    <h2>Gunslinger</h2>
    <p>Weapon: Dual Revolvers</p>
    <p>Playstyle: Fast close combat DPS</p>
    <span class="tag">Tier: A</span>
  </div>

</div>

<script>
  const data = [
    {
      name: "Dust Reaper",
      details: "Weapon: Repeater Rifle · Playstyle: Mid-range burst damage",
      tag: "Tier: S",
      source: "builds",
      page: "builds.html"
    },
    {
      name: "Gunslinger",
      details: "Weapon: Dual Revolvers · Playstyle: Fast close combat DPS",
      tag: "Tier: A",
      source: "builds",
      page: "builds.html"
    },
    {
      name: "S Tier",
      details: "Meta-defining weapons with the strongest performance.",
      tag: "Top Meta",
      source: "tiers",
      page: "tiers.html"
    },
    {
      name: "A Tier",
      details: "Reliable and powerful builds for most encounters.",
      tag: "Strong Choice",
      source: "tiers",
      page: "tiers.html"
    },
    {
      name: "B Tier",
      details: "Situational weapons with decent performance.",
      tag: "Balanced",
      source: "tiers",
      page: "tiers.html"
    }
  ];

  const input = document.getElementById('searchInput');
  const dropdown = document.getElementById('searchDropdown');
  let activeIndex = -1;
  let currentResults = [];

  function highlight(text, query) {
    if (!query) return text;
    const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return text.replace(regex, '<mark>$1</mark>');
  }

  function search(query) {
    if (!query.trim()) return [];
    const q = query.toLowerCase();
    return data.filter(item =>
      item.name.toLowerCase().includes(q) ||
      item.details.toLowerCase().includes(q) ||
      item.tag.toLowerCase().includes(q)
    );
  }

  function renderDropdown(query) {
    activeIndex = -1;
    currentResults = search(query);
    dropdown.innerHTML = '';

    if (!query.trim()) {
      dropdown.classList.remove('visible');
      return;
    }

    if (currentResults.length === 0) {
      dropdown.innerHTML = `<div class="dropdown-empty">No results for "${query}"</div>`;
      dropdown.classList.add('visible');
      return;
    }

    currentResults.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'dropdown-item';
      div.dataset.index = i;
      div.innerHTML = `
        <div class="item-name">${highlight(item.name, query)}</div>
        <div class="item-meta">${highlight(item.details, query)}</div>
        <span class="item-source ${item.source}">${item.source === 'builds' ? 'Builds' : 'Tiers'} · ${highlight(item.tag, query)}</span>
      `;
      div.addEventListener('mousedown', () => {
        window.location.href = item.page;
      });
      div.addEventListener('mouseover', () => {
        setActive(i);
      });
      dropdown.appendChild(div);
    });

    dropdown.classList.add('visible');
  }

  function setActive(index) {
    const items = dropdown.querySelectorAll('.dropdown-item');
    items.forEach(el => el.classList.remove('active'));
    if (index >= 0 && index < items.length) {
      items[index].classList.add('active');
      activeIndex = index;
    }
  }

  input.addEventListener('input', () => {
    renderDropdown(input.value);
  });

  input.addEventListener('keydown', (e) => {
    const items = dropdown.querySelectorAll('.dropdown-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      setActive(Math.min(activeIndex + 1, items.length - 1));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      setActive(Math.max(activeIndex - 1, 0));
    } else if (e.key === 'Enter') {
      if (activeIndex >= 0 && currentResults[activeIndex]) {
        window.location.href = currentResults[activeIndex].page;
      }
    } else if (e.key === 'Escape') {
      dropdown.classList.remove('visible');
      input.blur();
    }
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-wrapper')) {
      dropdown.classList.remove('visible');
    }
  });

  input.addEventListener('focus', () => {
    if (input.value.trim()) {
      renderDropdown(input.value);
    }
  });
</script>

</body>
</html>
