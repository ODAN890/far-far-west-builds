<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Builds</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: #f2e6d0;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('saloon.png') center/cover no-repeat;
      filter: brightness(0.35) blur(4px);
      transform: scale(1.08);
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, rgba(0,0,0,0.2), rgba(0,0,0,0.85));
      z-index: -1;
    }

    /* TOP BAR (SAME AS MAIN PAGE) */
    header {
      padding: 18px 30px;
      background: #000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a2a2a;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      color: #d99a4e;
      font-weight: 700;
      font-size: 26px;
      letter-spacing: 2px;
    }

    nav {
      display: flex;
      gap: 16px;
    }

    nav a {
      color: #f2e6d0;
      text-decoration: none;
      padding: 14px 22px;
      background: #1a1a1a;
      border: 1px solid #f2e6d0;
      border-radius: 12px;
      font-weight: bold;
      font-size: 16px;
    }

    nav a:hover {
      background: #d99a4e;
      color: black;
      border-color: #d99a4e;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      color: #d99a4e;
      font-size: 48px;
      margin: 30px 20px 10px;
    }

    .card {
      margin: 20px;
      padding: 20px;
      background: rgba(0,0,0,0.6);
      border: 1px solid #5a4630;
      border-radius: 12px;
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<header>
  <div class="logo">FAR FAR WEST BUILDS</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="builds.html">Builds</a>
    <a href="tiers.html">Tires</a>
  </nav>
</header>

<h1>Builds</h1>

<div class="card">
  <h2>Dust Reaper</h2>
  <p>Weapon: Repeater Rifle</p>
  <p>Tier: S</p>
</div>

<div class="card">
  <h2>Gunslinger</h2>
  <p>Weapon: Dual Revolvers</p>
  <p>Tier: A</p>
</div>

</body>
</html>
