<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Home</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: #f2e6d0;
      overflow: hidden;
    }

    /* ===== BACKGROUND (оставляем как у тебя было) ===== */
    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('saloon.png') center/cover no-repeat;
      filter: brightness(0.45) blur(3px);
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(0,0,0,0.10), rgba(0,0,0,0.80));
      z-index: -1;
    }

    /* =========================
       HEADER = 1:1 FROM BUILDS
    ========================= */
    header {
      padding: 18px 30px;
      background: #000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a2a2a;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      color: #d99a4e;
      font-weight: 700;
      font-size: 26px;
      letter-spacing: 2px;
    }

    nav {
      display: flex;
      gap: 16px;
    }

    nav a {
      color: #f2e6d0;
      text-decoration: none;
      padding: 14px 22px;
      background: #121212;
      border: 1px solid #f2e6d0;
      border-radius: 12px;
      font-weight: bold;
      font-size: 16px;
    }

    nav a:hover {
      background: #d99a4e;
      color: black;
      border-color: #d99a4e;
    }

    /* ===== HERO ===== */
    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .hero h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 70px;
      color: #d99a4e;
      margin: 0;

      text-shadow: 0 0 12px rgba(217,154,78,0.4);
    }

    /* (если у тебя был поиск — можно вернуть сюда позже) */
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<header>
  <div class="logo">FAR FAR WEST BUILDS</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="builds.html">Builds</a>
    <a href="tiers.html">Tires</a>
  </nav>
</header>

<div class="hero">
  <h1>Far Far West Builds</h1>
</div>

</body>
</html>
