<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Far Far West Builds</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: #f2e6d0;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('saloon.png') center/cover no-repeat;
      filter: brightness(0.55) blur(3px);
      transform: scale(1.04);
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(0,0,0,0.1), rgba(0,0,0,0.75));
      z-index: -1;
    }

    header {
      padding: 16px 24px;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      border-bottom: 1px solid rgba(255,170,70,0.2);
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      color: #ffab3d;
      font-weight: 800;
      font-size: 26px;
      text-shadow: 0 0 12px rgba(255,171,61,0.5);
      white-space: nowrap;
    }

    /* NAV */
    nav {
      display: flex;
      gap: 10px;
    }

    nav a {
      color: #f2e6d0;
      text-decoration: none;
      padding: 10px 14px;
      border: 1px solid #777;
      border-radius: 10px;
      background: rgba(30,30,30,0.6);
      font-weight: bold;
    }

    nav a:hover {
      background: #ffab3d;
      color: black;
      border-color: #ffab3d;
    }

    /* SEARCH */
    .search-box {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    .search-box input {
      width: 60%;
      max-width: 500px;
      padding: 10px 14px;

      background: #2a2a2a;
      border: 1px solid #666;
      border-radius: 10px;

      color: #fff;
      outline: none;
    }

    .search-box input::placeholder {
      color: #aaa;
    }

    /* HERO */
    .hero {
      height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .hero h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 74px;
      color: #ffab3d;
      margin: 0;
      text-shadow: 0 0 25px rgba(255,171,61,0.5);
    }

    .buttons {
      margin-top: 30px;
      display: flex;
      gap: 15px;
    }

    .btn {
      padding: 14px 22px;
      border-radius: 12px;
      font-weight: bold;
      text-decoration: none;
      background: rgba(20,20,20,0.8);
      color: white;
      border: 1px solid #777;
    }

    .btn:hover {
      background: #ffab3d;
      color: black;
      border-color: #ffab3d;
    }

    mark {
      background: #ffab3d;
      color: black;
      padding: 2px 4px;
      border-radius: 4px;
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<header>

  <div class="logo">FAR FAR WEST BUILDS</div>

  <!-- SEARCH -->
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search builds, weapons, tiers...">
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="builds.html">Builds</a>
    <a href="tiers.html">Tires</a>
  </nav>

</header>

<div class="hero">

  <h1>Far Far West Builds</h1>

  <div class="buttons">
    <a class="btn" href="builds.html">Explore Builds</a>
    <a class="btn" href="tiers.html">View Tires</a>
  </div>

</div>

<script>
const input = document.getElementById("searchInput");

input.addEventListener("input", function () {
  const query = this.value.toLowerCase();

  const textNodes = document.body.querySelectorAll("h1, h2, p, span");

  textNodes.forEach(el => {
    if (!el.textContent) return;

    const original = el.getAttribute("data-original") || el.textContent;

    if (!el.getAttribute("data-original")) {
      el.setAttribute("data-original", original);
    }

    if (query === "") {
      el.innerHTML = original;
      return;
    }

    if (original.toLowerCase().includes(query) && !original.includes("FAR FAR WEST BUILDS")) {
      el.innerHTML = original.replace(
        new RegExp(query, "gi"),
        match => `<mark>${match}</mark>`
      );
    } else {
      el.innerHTML = original;
    }
  });
});
</script>

</body>
</html>
