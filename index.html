<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Home - Far Far West Builds</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: #f2e6d0;
      overflow: hidden;
    }

    /* BACKGROUND */
    .bg {
      position: fixed;
      inset: 0;
      background: url('saloon.png') center/cover no-repeat;
      filter: brightness(0.55) blur(3px);
      transform: scale(1.04);
      z-index: -2;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, rgba(0,0,0,0.1), rgba(0,0,0,0.75));
      z-index: -1;
    }

    /* =======================
       HEADER (СИНК С BUILDS)
    ======================= */
    header {
      height: 72px; /* КЛЮЧЕВО: фикс высота как в builds */
      padding: 0 28px;

      background: rgba(0,0,0,0.92);

      display: flex;
      align-items: center;
      justify-content: space-between;

      border-bottom: 1px solid rgba(255,171,61,0.2);
      box-sizing: border-box;
    }

    /* LOGO */
    .logo {
      font-family: 'Orbitron', sans-serif;
      color: #ffab3d;

      font-size: 28px; /* одинаково крупный */
      font-weight: 800;

      text-shadow:
        0 0 10px rgba(255,171,61,0.6),
        0 0 25px rgba(255,140,0,0.4);
    }

    /* NAV (ВАЖНО: увеличен spacing как в builds) */
    nav {
      display: flex;
      gap: 22px; /* больше воздуха между кнопками */
      align-items: center;
    }

    nav a {
      color: #f2e6d0;
      text-decoration: none;

      padding: 14px 20px; /* увеличено */
      font-size: 16px;     /* одинаковый текст */

      border: 1px solid #777;
      border-radius: 12px;

      background: rgba(30,30,30,0.6);

      font-weight: bold;

      transition: 0.2s;
    }

    nav a:hover {
      background: rgba(255,171,61,0.85);
      color: black;
      border-color: #ffab3d;
    }

    /* SEARCH */
    .search-wrapper {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 320px;
    }

    .search-wrapper input {
      width: 100%;
      padding: 10px 12px;
      background: #2a2a2a;
      border: 1px solid #666;
      border-radius: 10px;
      color: white;
      outline: none;
    }

    .results {
      position: absolute;
      top: 42px;
      width: 100%;
      background: rgba(20,20,20,0.95);
      border: 1px solid #555;
      border-radius: 10px;
      display: none;
    }

    .result-item {
      padding: 10px;
      cursor: pointer;
    }

    .result-item:hover {
      background: #ffab3d;
      color: black;
    }

    /* HERO */
    .hero {
      height: calc(100vh - 72px);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .hero h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 74px;
      margin: 0;

      color: #ffab3d;

      text-shadow:
        0 0 12px rgba(255,171,61,0.6),
        0 0 28px rgba(255,140,0,0.4);
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<header>

  <div class="logo">FAR FAR WEST BUILDS</div>

  <div class="search-wrapper">
    <input id="search" placeholder="Search builds or tiers...">
    <div class="results" id="results"></div>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="builds.html">Builds</a>
    <a href="tiers.html">Tires</a>
  </nav>

</header>

<div class="hero">
  <h1>Far Far West Builds</h1>
</div>

<script>
const data = [
  { name: "Dust Reaper Build", link: "builds.html" },
  { name: "Gunslinger Build", link: "builds.html" },
  { name: "S Tier", link: "tiers.html" }
];

const input = document.getElementById("search");
const results = document.getElementById("results");

input.addEventListener("input", () => {
  const value = input.value.toLowerCase();
  results.innerHTML = "";

  if (!value) {
    results.style.display = "none";
    return;
  }

  const filtered = data.filter(item =>
    item.name.toLowerCase().includes(value)
  );

  filtered.forEach(item => {
    const div = document.createElement("div");
    div.className = "result-item";
    div.textContent = item.name;
    div.onclick = () => location.href = item.link;
    results.appendChild(div);
  });

  results.style.display = filtered.length ? "block" : "none";
});
</script>

</body>
</html>
