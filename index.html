<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Far Far West Builds</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: #f2e6d0;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: url('saloon.png') center/cover no-repeat;
      filter: brightness(0.55) blur(3px);
      transform: scale(1.04);
      z-index: -2;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, rgba(0,0,0,0.1), rgba(0,0,0,0.75));
      z-index: -1;
    }

    header {
      padding: 16px 24px;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      color: #ffab3d;
      font-size: 26px;
      font-weight: 800;
    }

    /* SEARCH */
    .search-wrapper {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 320px;
    }

    .search-wrapper input {
      width: 100%;
      padding: 10px;
      background: #2a2a2a;
      border: 1px solid #666;
      border-radius: 10px;
      color: white;
      outline: none;
    }

    .results {
      position: absolute;
      top: 42px;
      width: 100%;
      background: rgba(20,20,20,0.95);
      border: 1px solid #555;
      border-radius: 10px;
      display: none;
    }

    .result-item {
      padding: 10px;
      cursor: pointer;
    }

    .result-item:hover {
      background: #ffab3d;
      color: black;
    }

    nav {
      display: flex;
      gap: 10px;
    }

    nav a {
      color: #f2e6d0;
      text-decoration: none;
      padding: 10px 14px;
      border: 1px solid #777;
      border-radius: 10px;
    }

    .hero {
      height: calc(100vh - 80px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hero h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 74px;
      color: #ffab3d;
    }

    /* 🌵 CACTUS */
    .cactus {
      position: fixed;
      left: 50%;
      top: 0;

      width: 50px;
      height: 70px;

      background: #0f3d2e;
      border-radius: 20px 20px 10px 10px;

      box-shadow: 0 0 12px rgba(0,255,180,0.35);

      z-index: 9999;
      cursor: pointer;
    }

    .cactus::before,
    .cactus::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 20px;
      background: #0f3d2e;
      border-radius: 4px;
    }

    .cactus::before { left: -6px; top: 20px; }
    .cactus::after { right: -6px; top: 30px; }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<header>
  <div class="logo">FAR FAR WEST BUILDS</div>

  <div class="search-wrapper">
    <input id="search" placeholder="Search builds or tiers...">
    <div class="results" id="results"></div>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="builds.html">Builds</a>
    <a href="tiers.html">Tires</a>
  </nav>
</header>

<div class="hero">
  <h1>Far Far West Builds</h1>
</div>

<!-- 🌵 CACTUS -->
<div class="cactus" id="cactus"></div>

<script>
/* SEARCH */
const data = [
  { name: "Dust Reaper Build", link: "builds.html" },
  { name: "Gunslinger Build", link: "builds.html" },
  { name: "S Tier", link: "tiers.html" }
];

const input = document.getElementById("search");
const results = document.getElementById("results");

input.addEventListener("input", () => {
  const value = input.value.toLowerCase();
  results.innerHTML = "";

  if (!value) return results.style.display = "none";

  const filtered = data.filter(i => i.name.toLowerCase().includes(value));

  filtered.forEach(i => {
    const div = document.createElement("div");
    div.className = "result-item";
    div.textContent = i.name;
    div.onclick = () => location.href = i.link;
    results.appendChild(div);
  });

  results.style.display = "block";
});

/* CACTUS PHYSICS */
const cactus = document.getElementById("cactus");

let y = 0;
let v = 0;
const g = 0.6;
const bounce = 0.65;
const ground = window.innerHeight - 100;

function loop() {
  v += g;
  y += v;

  if (y > ground) {
    y = ground;
    v *= -bounce;
  }

  cactus.style.transform = `translateY(${y}px)`;

  requestAnimationFrame(loop);
}

loop();

cactus.addEventListener("click", () => {
  v -= 10;
});
</script>

</body>
</html>
