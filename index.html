<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Far Far West Builds</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: #f2e6d0;
      background: #000;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('saloon.png') center/cover no-repeat;
      filter: brightness(0.4) blur(4px);
      transform: scale(1.08);
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, rgba(0,0,0,0.2), rgba(0,0,0,0.85));
      z-index: -1;
    }

    header {
      padding: 20px 30px;
      background: #000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a2a2a;
    }

    .logo {
      color: #d99a4e;
      font-weight: bold;
    }

    nav {
      display: flex;
      gap: 14px;
    }

    nav a {
      color: #f2e6d0;
      text-decoration: none;
      padding: 12px 18px;
      background: #1a1a1a;
      border: 1px solid #f2e6d0;
      border-radius: 12px;
      font-weight: bold;
      font-size: 15px;
    }

    nav a:hover {
      background: #d99a4e;
      color: black;
      border-color: #d99a4e;
    }

    .hero {
      text-align: center;
      padding: 150px 20px;
    }

    /* MAIN TITLE */
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 64px;
      margin: 0;
      letter-spacing: 2px;

      background: linear-gradient(
        90deg,
        #d99a4e 0%,
        #d99a4e 80%,
        #ffffff 90%,
        #7CFFB2 100%
      );

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      animation: glow 2.5s ease-in-out infinite;
    }

    /* ANIMATED GLOW */
    @keyframes glow {
      0% {
        filter: drop-shadow(0 0 6px rgba(217,154,78,0.35))
                drop-shadow(0 0 12px rgba(217,154,78,0.2));
      }
      50% {
        filter: drop-shadow(0 0 14px rgba(217,154,78,0.7))
                drop-shadow(0 0 28px rgba(217,154,78,0.4));
      }
      100% {
        filter: drop-shadow(0 0 6px rgba(217,154,78,0.35))
                drop-shadow(0 0 12px rgba(217,154,78,0.2));
      }
    }

    p {
      color: #d6c2a8;
      font-size: 18px;
    }

    .buttons {
      margin-top: 25px;
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .btn {
      padding: 14px 24px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
    }

    .btn-primary {
      background: #d99a4e;
      color: black;
    }

    .btn-secondary {
      background: #d99a4e;
      color: black;
    }

    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<header>
  <div class="logo">FAR FAR WEST BUILDS</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="builds.html">Builds</a>
    <a href="tiers.html">Tiers</a>
  </nav>
</header>

<div class="hero">
  <h1>Far Far West Builds</h1>
  <p>Weapon builds & tier meta for the Wild West future</p>

  <div class="buttons">
    <a class="btn btn-primary" href="builds.html">Explore Builds</a>
    <a class="btn btn-secondary" href="tiers.html">View Tires</a>
  </div>
</div>

</body>
</html>
