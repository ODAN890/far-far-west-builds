<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Far Far West Builds</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: #f2e6d0;
      overflow: hidden;
    }

    /* BACKGROUND */
    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      background: url('saloon.png') center/cover no-repeat;

      filter: brightness(0.55) blur(3px);

      transform: scale(1.04);

      z-index: -2;
    }

    /* OVERLAY */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      background:
        radial-gradient(
          circle at center,
          rgba(0,0,0,0.12),
          rgba(0,0,0,0.72)
        );

      z-index: -1;
    }

    /* TOP PANEL */
    header {
      padding: 18px 30px;

      background: rgba(0,0,0,0.92);

      display: flex;
      justify-content: space-between;
      align-items: center;

      border-bottom: 1px solid rgba(255,170,70,0.25);

      backdrop-filter: blur(8px);
    }

    /* LOGO */
    .logo {
      font-family: 'Orbitron', sans-serif;

      color: #ffab3d;

      font-weight: 800;

      font-size: 28px;

      letter-spacing: 2px;

      text-shadow:
        0 0 8px rgba(255,171,61,0.55),
        0 0 20px rgba(255,171,61,0.28),
        0 0 36px rgba(255,171,61,0.12);
    }

    /* NAVIGATION */
    nav {
      display: flex;
      gap: 16px;
    }

    nav a {
      color: #f2e6d0;

      text-decoration: none;

      padding: 14px 22px;

      background: rgba(20,20,20,0.72);

      border: 1px solid rgba(255,255,255,0.8);

      border-radius: 12px;

      font-weight: bold;
      font-size: 16px;

      transition: 0.25s;
    }

    nav a:hover {
      background: #ffab3d;
      color: black;

      border-color: #ffab3d;

      box-shadow:
        0 0 14px rgba(255,171,61,0.5);
    }

    /* HERO */
    .hero {
      height: calc(100vh - 90px);

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      text-align: center;

      padding: 20px;
    }

    .hero h1 {
      font-family: 'Orbitron', sans-serif;

      font-size: 74px;

      margin: 0;

      letter-spacing: 3px;

      color: #ffab3d;

      text-shadow:
        0 0 10px rgba(255,171,61,0.75),
        0 0 25px rgba(255,171,61,0.45),
        0 0 45px rgba(255,171,61,0.22);

      animation: glowPulse 3s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0% {
        text-shadow:
          0 0 10px rgba(255,171,61,0.65),
          0 0 20px rgba(255,171,61,0.35),
          0 0 35px rgba(255,171,61,0.15);
      }

      50% {
        text-shadow:
          0 0 16px rgba(255,171,61,0.95),
          0 0 35px rgba(255,171,61,0.65),
          0 0 60px rgba(255,171,61,0.35);
      }

      100% {
        text-shadow:
          0 0 10px rgba(255,171,61,0.65),
          0 0 20px rgba(255,171,61,0.35),
          0 0 35px rgba(255,171,61,0.15);
      }
    }

    .hero p {
      margin-top: 18px;

      font-size: 20px;

      color: #f3ddbf;

      max-width: 700px;
    }

    /* BUTTONS */
    .buttons {
      margin-top: 35px;

      display: flex;
      gap: 18px;
    }

    .btn {
      padding: 16px 28px;

      border-radius: 14px;

      text-decoration: none;

      font-weight: bold;

      font-size: 17px;

      transition: 0.25s;

      border: 1px solid rgba(255,255,255,0.75);

      background: rgba(15,15,15,0.75);

      color: #f2e6d0;
    }

    .btn:hover {
      background: #ffab3d;

      color: black;

      border-color: #ffab3d;

      box-shadow:
        0 0 18px rgba(255,171,61,0.45);
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<header>
  <div class="logo">FAR FAR WEST BUILDS</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="builds.html">Builds</a>
    <a href="tiers.html">Tires</a>
  </nav>
</header>

<div class="hero">

  <h1>Far Far West Builds</h1>

  <p>
    Weapon builds, tier lists and meta loadouts
    for the futuristic Wild West.
  </p>

  <div class="buttons">
    <a class="btn" href="builds.html">Explore Builds</a>
    <a class="btn" href="tiers.html">View Tires</a>
  </div>

</div>

</body>
</html>
