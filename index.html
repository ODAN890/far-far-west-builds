<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Far Far West Builds</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: #f2e6d0;
      background: #000;
    }

    /* BACKGROUND IMAGE LAYER */
    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') center/cover no-repeat;
      filter: brightness(0.35);
      z-index: -1;
    }

    header {
      padding: 20px 30px;
      background: rgba(36, 29, 22, 0.85);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #5a4630;
    }

    .logo {
      color: #d99a4e;
      font-weight: bold;
      font-size: 18px;
    }

    nav {
      display: flex;
      gap: 12px;
    }

    nav a {
      color: #f2e6d0;
      text-decoration: none;
      padding: 10px 16px;
      background: #3a2d20;
      border-radius: 10px;
      font-weight: bold;
    }

    nav a:hover {
      background: #d99a4e;
      color: black;
    }

    .hero {
      text-align: center;
      padding: 140px 20px;
    }

    h1 {
      font-size: 60px;
      color: #d99a4e;
      margin-bottom: 10px;
    }

    p {
      color: #d6c2a8;
      font-size: 18px;
    }

    .buttons {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .btn {
      padding: 14px 22px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
      transition: 0.2s;
    }

    .btn-primary {
      background: #d99a4e;
      color: black;
    }

    .btn-secondary {
      background: #3a2d20;
      color: #f2e6d0;
    }

    .btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }
  </style>
</head>

<body>

<div class="bg"></div>

<header>
  <div class="logo">FAR FAR WEST BUILDS</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="builds.html">Builds</a>
    <a href="tiers.html">Tiers</a>
  </nav>
</header>

<div class="hero">
  <h1>Far Far West Builds</h1>
  <p>Weapon builds & tier meta for the Wild West future</p>

  <div class="buttons">
    <a class="btn btn-primary" href="builds.html">Explore Builds</a>
    <a class="btn btn-secondary" href="tiers.html">View Tiers</a>
  </div>
</div>

</body>
</html>
