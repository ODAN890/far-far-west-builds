<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Far Far West Builds</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1c1712;
      color: #f2e6d0;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      background: #241d16;
      border-bottom: 1px solid #5a4630;
    }

    .logo {
      color: #d99a4e;
      font-weight: bold;
      font-size: 20px;
    }

    nav a {
      margin-left: 15px;
      color: #f2e6d0;
      text-decoration: none;
      padding: 8px 12px;
      background: #3a2d20;
      border-radius: 8px;
    }

    nav a:hover {
      background: #d99a4e;
      color: black;
    }

    .hero {
      padding: 60px 20px;
      text-align: center;
    }

    h1 {
      color: #d99a4e;
      font-size: 40px;
    }

    .section {
      padding: 40px 20px;
    }

    .card {
      background: #2a2119;
      padding: 20px;
      margin: 10px;
      border-radius: 12px;
      border: 1px solid #5a4630;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">FAR FAR WEST BUILDS</div>
  <nav>
    <a href="#builds">Builds</a>
    <a href="#tiers">Tiers</a>
  </nav>
</header>

<div class="hero">
  <h1>Build Your Cowboy Loadout</h1>
  <p>Weapons, builds and tier lists for Far Far West</p>
</div>

<div id="builds" class="section">
  <h2>Builds</h2>

  <div class="card">
    <h3>Dust Reaper</h3>
    <p>Weapon: Repeater Rifle</p>
    <p>Tier: S</p>
  </div>

  <div class="card">
    <h3>Gunslinger</h3>
    <p>Weapon: Dual Revolvers</p>
    <p>Tier: A</p>
  </div>
</div>

<div id="tiers" class="section">
  <h2>Tiers</h2>

  <div class="card">S Tier: OP weapons</div>
  <div class="card">A Tier: Strong weapons</div>
  <div class="card">B Tier: Balanced</div>
  <div class="card">D Tier: Weak</div>
</div>

</body>
</html>
