<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Home - Far Far West Builds</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: #f2e6d0;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: url('saloon.png') center/cover no-repeat;
      filter: brightness(0.55) blur(3px);
      transform: scale(1.04);
      z-index: -2;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, rgba(0,0,0,0.1), rgba(0,0,0,0.75));
      z-index: -1;
    }

    /* ===== HEADER (СИНХРОНИЗИРОВАН С BUILDS/TIERS) ===== */
    header {
      padding: 16px 24px;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      border-bottom: 1px solid rgba(255,171,61,0.15);
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      color: #ffab3d;
      font-size: 26px;
      font-weight: 800;

      text-shadow:
        0 0 10px rgba(255,171,61,0.6),
        0 0 25px rgba(255,140,0,0.4);
    }

    nav {
      display: flex;
      gap: 18px;
    }

    nav a {
      color: #f2e6d0;
      text-decoration: none;

      padding: 12px 18px;
      font-size: 15px;

      border: 1px solid #777;
      border-radius: 12px;

      background: rgba(30,30,30,0.6);

      transition: 0.2s;
      font-weight: bold;
    }

    nav a:hover {
      background: rgba(255,171,61,0.85);
      color: black;
      border-color: #ffab3d;
      transform: translateY(-1px);
    }

    /* ===== HERO ===== */
    .hero {
      height: calc(100vh - 80px);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .hero h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 74px;
      margin: 0;

      color: #ffab3d;

      text-shadow:
        0 0 12px rgba(255,171,61,0.6),
        0 0 28px rgba(255,140,0,0.4);
    }

    .hero p {
      margin-top: 10px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<header>

  <div class="logo">FAR FAR WEST BUILDS</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="builds.html">Builds</a>
    <a href="tiers.html">Tiers</a>
  </nav>

</header>

<div class="hero">
  <h1>Far Far West Builds</h1>
  <p>Weapon builds and tier lists for the Wild West future</p>
</div>

</body>
</html>
